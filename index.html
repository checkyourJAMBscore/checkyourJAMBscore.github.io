<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Check Your Score</title>

<style>
body {
    background: black;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

input {
    padding: 10px;
    margin-top: 15px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

#output {
    margin-top: 20px;
    font-size: 22px;
}

#watermark {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: rgba(0,255,204,0.4);
    opacity: 0;
    transition: opacity 2s;
}
</style>
</head>

<body>

<h2>Enter your code to continue</h2>

<input type="text" placeholder="Type anything...">
<br>
<button onclick="check()">Check</button>

<div id="output"></div>
<div id="watermark">Edited by Rowen</div>

<script>
function check() {
    const output = document.getElementById("output");
    output.innerHTML = "Fetching result...";

    setTimeout(() => {
        typeMessage("I just wanted you to know...\nJesus loves you 🌚");
        document.getElementById("watermark").style.opacity = 1;
    }, 2000);
}

function typeMessage(msg) {
    let i = 0;
    const output = document.getElementById("output");
    output.innerHTML = "";

    function typing() {
        if (i < msg.length) {
            output.innerHTML += msg.charAt(i) === "\n" ? "<br>" : msg.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }

    typing();
}
</script>

</body>
</html>
