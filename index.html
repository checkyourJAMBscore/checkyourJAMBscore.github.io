<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result Checker</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffffff, #1b8f3a);
    font-family: Calibri, Arial, sans-serif;
    color: #0b3d1f;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 80%;
    max-width: 400px;
}

h2 {
    font-family: "Times New Roman", serif;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #1b8f3a;
    border-radius: 5px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #1b8f3a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#output {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

#watermark {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">
    <h2>Result Access Portal</h2>
    <p>Enter your JAMß profile code or email to continue</p>

    <input type="text" placeholder="Enter details here...">
    <br>
    <button onclick="check()">Continue</button>

    <div id="output"></div>
</div>

<div id="watermark">Edited by Rowen</div>

<script>
function check() {
    const output = document.getElementById("output");
    output.innerHTML = "Loading...";

    setTimeout(() => {
        output.innerHTML = "I just wanted you to know ❤️<br>Jesus loves you 🌿";
    }, 2000);
}
</script>

</body>
</html>
