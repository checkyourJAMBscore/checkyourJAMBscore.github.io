<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffffff, #1b8f3a);
    font-family: Calibri, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Input screen */
#start {
    text-align: center;
    width: 90%;
}

input {
    width: 90%;
    padding: 15px;
    font-size: 18px;
    border: 2px solid #1b8f3a;
    border-radius: 8px;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 18px;
    background: #1b8f3a;
    color: white;
    border: none;
    border-radius: 8px;
}

/* Full message takeover screen */
#messageScreen {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    color: #1b8f3a;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

/* Big main text */
#message {
    font-size: 32px;
    font-weight: bold;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s ease;
}

/* Watermark */
#watermark {
    margin-top: 30px;
    font-size: 24px;
    font-weight: bold;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
}
</style>
</head>

<body>

<!-- Input Screen -->
<div id="start">
    <h2>Enter your JAMß profile Code or phone number or email address to access your result</h2>
    <input type="text" placeholder="Enter text...">
    <br>
    <button onclick="showMessage()">Continue</button>
</div>

<!-- Message Screen -->
<div id="messageScreen">
    <div id="message">I just wanted you to know that Jesus Loves you🌚🤭</div>
    <div id="watermark">Edited by Rowen😁🕊️</div>
</div>

<script>
function showMessage() {
    document.getElementById("start").style.display = "none";
    document.getElementById("messageScreen").style.display = "flex";

    // animate main message
    setTimeout(() => {
        const msg = document.getElementById("message");
        msg.style.opacity = "1";
        msg.style.transform = "translateY(0)";
    }, 300);

    // animate watermark AFTER message
    setTimeout(() => {
        const wm = document.getElementById("watermark");
        wm.style.opacity = "1";
        wm.style.transform = "translateY(0)";
    }, 2000);
}
</script>

</body>
</html>
